name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ============================================================
  # Linux AppImage
  # ============================================================
  build-linux:
    # ubuntu-22.04 (glibc 2.35) 确保二进制兼容主流桌面发行版
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build fuse libfuse2 \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libgl-dev libxxf86vm-dev

      - name: Build raylib (static)
        run: |
          git clone --depth 1 --branch 6.0 https://github.com/raysan5/raylib.git /tmp/raylib
          cd /tmp/raylib
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          ninja
          sudo ninja install

      - name: Build project
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Verify static link
        run: |
          if ldd build/main_c | grep -q libraylib; then
            echo "WARNING: dynamically linked to libraylib"
            exit 1
          fi
          echo "OK: raylib is statically linked"

      - name: Download appimagetool
        run: |
          curl -fSL -o build/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x build/appimagetool

      - name: Package Linux portable tar.gz
        run: |
          mkdir -p dist/背单词软件
          cp build/main_c dist/背单词软件/
          cp -r data dist/背单词软件/
          cd dist
          tar czf "../build/背单词软件-linux-x86_64.tar.gz" 背单词软件/

      - name: Build AppImage
        run: |
          mkdir -p build/AppDir/usr/bin
          mkdir -p build/AppDir/usr/share/recite-english
          mkdir -p build/AppDir/usr/share/icons/hicolor/scalable/apps

          cp build/main_c build/AppDir/usr/bin/
          cp -r data build/AppDir/usr/share/recite-english/
          cp packaging/AppImage/AppRun build/AppDir/
          chmod +x build/AppDir/AppRun
          cp packaging/AppImage/背单词软件.desktop build/AppDir/
          cp packaging/AppImage/recite-english.svg build/AppDir/
          cp packaging/AppImage/recite-english.svg build/AppDir/usr/share/icons/hicolor/scalable/apps/

          cd build
          # --appimage-extract-and-run 绕过 FUSE，确保在 CI 无 FUSE 环境下也能运行
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run --no-appstream AppDir 背单词软件-x86_64.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: |
            build/背单词软件-x86_64.AppImage
            build/背单词软件-linux-x86_64.tar.gz

  # ============================================================
  # Windows exe (MSYS2 UCRT64)
  # ============================================================
  build-windows:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-raylib
            zip

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release
          ninja 2>&1

      - name: Copy runtime DLLs
        run: |
          cp /ucrt64/bin/raylib.dll build/ 2>/dev/null || true
          cp /ucrt64/bin/glfw3.dll build/ 2>/dev/null || true

      - name: Verify
        run: ls -la build/main_c.exe build/*.dll 2>/dev/null || ls -la build/main_c.exe

      - name: Package Windows portable zip
        run: |
          mkdir -p dist/背单词软件
          cp build/main_c.exe dist/背单词软件/
          cp build/*.dll dist/背单词软件/ 2>/dev/null || true
          cp -r data dist/背单词软件/
          cd dist
          zip -r "../build/背单词软件-windows-x86_64.zip" 背单词软件/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            build/背单词软件-windows-x86_64.zip
            build/main_c.exe
            build/*.dll

  # ============================================================
  # Create GitHub Release
  # ============================================================
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release
          cp artifacts/linux-package/背单词软件-x86_64.AppImage release/
          cp artifacts/linux-package/背单词软件-linux-x86_64.tar.gz release/
          cp artifacts/windows-package/背单词软件-windows-x86_64.zip release/
          chmod +x release/背单词软件-x86_64.AppImage

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/背单词软件-x86_64.AppImage
            release/背单词软件-linux-x86_64.tar.gz
            release/背单词软件-windows-x86_64.zip
